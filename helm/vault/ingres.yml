apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: default
  annotations:
    external-dns.alpha.kubernetes.io/hostname: vault.lanfordlabs.com
    cert-manager.io/cluster-issuer: letsencrypt-prd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - vault.lanfordlabs.com
      secretName: vault-tls
  rules:
    - host: vault.lanfordlabs.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-external
                port:
                  number: 8200