---
- name: Create k3s registries config directory
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure containerd registry mirror
  copy:
    dest: /etc/rancher/k3s/registries.yaml
    owner: root
    group: root
    mode: '0644'
    content: |
      mirrors:
        "docker.io":
          endpoint:
            - "http://{{ registry_ip }}:{{ registry_port }}"
            
- name: Copy K3s service file
  template:
    src: "k3s.service.j2"
    dest: "{{ systemd_dir }}/k3s-node.service"
    owner: root
    group: root
    mode: 0755

- name: Enable and check K3s service
  systemd:
    name: k3s-node
    daemon_reload: true
    state: restarted
    enabled: true
